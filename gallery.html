<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="gallery_styles.css">
</head>
<body>
    <div class="gallery">
        <img src="images/photo1.jpg" alt="Photo 1" class="gallery-item" data-description="A beautiful sunrise over the mountains." />
        <img src="images/photo2.jpg" alt="Photo 2" class="gallery-item" data-description="A peaceful lake surrounded by lush trees." />
        <img src="images/photo3.jpg" alt="Photo 3" class="gallery-item" data-description="A busy city street at night, full of lights." />
        <img src="images/photo4.jpg" alt="Photo 4" class="gallery-item" data-description="A lone traveler walking in the desert." />
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-container">
            <div class="lightbox-description" id="lightbox-desc"></div>
            <img class="lightbox-content" id="lightbox-img" />
        </div>
        <span class="close">&times;</span>
        <a class="prev" id="prev">&#10094;</a>
        <a class="next" id="next">&#10095;</a>
    </div>

    <script src="gallery_script.js"></script>
</body>
</html>
