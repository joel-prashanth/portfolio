<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joel Prashanth | Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <a href="#" class="logo">JP</a>
        <ul class="nav-links">
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="menu-container">
          <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
          <div class="menu-icon" onclick="toggleSidebar()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="30px"
              viewBox="0 -960 960 960"
              width="30px"
              fill="currentColor"
            >
              <path
                d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
              />
            </svg>
          </div>
        </div>
      </nav>

      <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
        <ul>
          <li><a href="#gallery" onclick="toggleSidebar()">Gallery</a></li>
          <li><a href="#projects" onclick="toggleSidebar()">Projects</a></li>
          <li><a href="#contact" onclick="toggleSidebar()">Contact</a></li>
        </ul>
      </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-image">
          <img src="joel.jpg" alt="Joel Prashanth">
        </div>
        <div class="hero-content">
          <h1>Hi, I'm <span class="highlight">Joel Prashanth</span></h1>
          <h2 class="animated-text"></h2>
          <p>
            Passionate about building innovative projects in web development and embedded systems.
          </p>
          <div class="hero-buttons">
            <a href="#projects" class="btn primary">View Projects</a>
            <a href="#contact" class="btn secondary">Contact Me</a>
          </div>
        </div>
      </section>

    <script src="script.js"></script>
  </body>
</html>
